<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Laura Chavarri Propiedades</title>
    <meta name="description" content="Más de 25 años de experiencia en el mercado inmobiliario de Mar del Plata. Compra, venta y alquiler de propiedades." />
  </head>
  <body>
    <!-- Hidden form for Netlify Forms detection -->
    <form name="contacto" netlify netlify-honeypot="bot-field" hidden>

      <input type="text" name="apellido"/>
      <input type="email" name="email"/>
      <input type="tel" name="tel"/>
      <select name="interes"><option>Comprar una propiedad</option></select>
      <textarea name="mensaje"></textarea>
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
